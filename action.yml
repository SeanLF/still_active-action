name: 'still_active'
description: 'Audit your Gemfile for maintenance signals, vulnerabilities, libyear drift, and archived repositories.'
author: 'Sean Floyd'

branding:
  icon: 'activity'
  color: 'green'

inputs:
  gemfile-path:
    description: 'Path to the Gemfile to audit. Defaults to ./Gemfile resolved against the workflow working directory.'
    required: false
  gems:
    description: 'Comma-separated list of gems to audit instead of a Gemfile.'
    required: false
  ignore:
    description: |
      Gems to exclude from pass/fail checks (still shown in output).
      Accepts a comma-separated list or a YAML block scalar with one gem per line.
    required: false
  fail-if-warning:
    description: 'Exit 1 if any gem has stale/critical/archived activity. "true" to enable.'
    required: false
    default: 'false'
  fail-if-vulnerable:
    description: |
      Exit 1 if any gem has vulnerabilities. "true" for any severity, or one of:
      low, medium, high, critical to gate at or above that level.
    required: false
    default: 'false'
  fail-if-outdated:
    description: 'Exit 1 if any gem exceeds the given libyears behind latest (e.g. 3).'
    required: false
  output-format:
    description: 'Output format: terminal, markdown, or json. Defaults to json (CI is non-TTY).'
    required: false
    default: 'json'
  sarif:
    description: |
      Emit SARIF 2.1.0 to the given path (e.g. still_active.sarif.json) for GitHub Code Scanning.
      Pair with github/codeql-action/upload-sarif@v3 in your workflow (and the
      security-events: write permission). Use "-" to write to stdout.
    required: false
  baseline:
    description: |
      Path to a baseline still_active JSON snapshot. Emits a markdown delta report
      instead of an absolute snapshot. Exits 1 on regressions.
    required: false
  cyclonedx:
    description: |
      Emit a CycloneDX SBOM to the given path (e.g. sbom.cdx.json), or "-" for stdout,
      so the dependency graph + still_active's signals feed Trivy / Dependency-Track / Snyk.
      Requires still_active >= 1.5.0. Overrides output-format; superseded by sarif and baseline.
    required: false
  cyclonedx-version:
    description: 'CycloneDX spec version to emit: 1.6 (default) or 1.7. Only applies with cyclonedx.'
    required: false
  alternatives:
    description: |
      Suggest up to three maintained alternative gems (Ruby Toolbox leads, ranked by
      downloads) for gems flagged archived/critical. Leads to verify, not vetted
      recommendations; silent when the catalog has no entry. "true" to enable.
      Requires still_active >= 1.6.0.
    required: false
    default: 'false'
  bundler-audit:
    description: |
      Install bundler-audit and fetch ruby-advisory-db so still_active merges its advisories
      with deps.dev (dual-source vulnerabilities, deduplicated). On by default; set "false"
      to skip the install (~10s) and run deps.dev only. Requires still_active >= 1.5.0.
    required: false
    default: 'true'
  cvss-suite:
    description: |
      Install cvss-suite so still_active can score advisories that publish only a CVSS 4.0
      vector (no CVSS 3.x, no numeric score). Without it those advisories stay unscored, and
      under still_active >= 3.0.0 an unscored advisory fails the fail-if-vulnerable severity
      gate closed (see the upgrade note in the README). Opt-in; set "true" to enable.
      Requires still_active >= 3.0.0.
    required: false
    default: 'false'
  github-token:
    description: >-
      GitHub token used by still_active for the GitHub API. Pass the workflow's
      github.token (or a dedicated PAT) explicitly — without one, still_active
      hits the unauthenticated 60 req/hour limit fast.
    required: false
  gitlab-token:
    description: 'GitLab token for GitLab-hosted gems (optional for public repos).'
    required: false
  version:
    description: 'still_active gem version to install. "latest" or a pinned version like "1.4.0".'
    required: false
    default: 'latest'
  working-directory:
    description: 'Directory to run the audit from. Defaults to the workflow workspace root.'
    required: false
    default: '.'
  extra-args:
    description: |
      Additional raw flags passed to still_active (escape hatch for less common flags like
      --safe-range-end, --warning-range-end, --simultaneous-requests).
      WARNING: do not pass user-controlled input here; this value is shell-split.
    required: false

outputs:
  exit-code:
    description: 'Exit code returned by still_active (0 = pass, 1 = gating flag tripped or regression).'
    value: ${{ steps.run.outputs.exit-code }}
  report-path:
    description: 'Path to the captured report file inside the runner.'
    value: ${{ steps.run.outputs.report-path }}
  sarif-path:
    description: 'Path to the SARIF file when --sarif was requested (empty otherwise).'
    value: ${{ steps.run.outputs.sarif-path }}
  cyclonedx-path:
    description: 'Path to the CycloneDX SBOM file when cyclonedx wrote to a file (empty for stdout or when unused).'
    value: ${{ steps.run.outputs.cyclonedx-path }}

runs:
  using: 'composite'
  steps:
    - id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INPUT_GEMFILE_PATH: ${{ inputs.gemfile-path }}
        INPUT_GEMS: ${{ inputs.gems }}
        INPUT_IGNORE: ${{ inputs.ignore }}
        INPUT_FAIL_IF_WARNING: ${{ inputs.fail-if-warning }}
        INPUT_FAIL_IF_VULNERABLE: ${{ inputs.fail-if-vulnerable }}
        INPUT_FAIL_IF_OUTDATED: ${{ inputs.fail-if-outdated }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        INPUT_SARIF: ${{ inputs.sarif }}
        INPUT_BASELINE: ${{ inputs.baseline }}
        INPUT_CYCLONEDX: ${{ inputs.cyclonedx }}
        INPUT_CYCLONEDX_VERSION: ${{ inputs.cyclonedx-version }}
        INPUT_ALTERNATIVES: ${{ inputs.alternatives }}
        INPUT_BUNDLER_AUDIT: ${{ inputs.bundler-audit }}
        INPUT_CVSS_SUITE: ${{ inputs.cvss-suite }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_GITLAB_TOKEN: ${{ inputs.gitlab-token }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_EXTRA_ARGS: ${{ inputs.extra-args }}
      run: |
        set -euo pipefail

        echo "::group::Installing still_active"
        if [ "${INPUT_VERSION}" = "latest" ]; then
          gem install still_active --no-document
        else
          gem install still_active --no-document --version "${INPUT_VERSION}"
        fi
        echo "::endgroup::"

        # Optional second vulnerability source. still_active detects bundler-audit at
        # runtime and merges ruby-advisory-db advisories with deps.dev when its checkout
        # is present. Best-effort: a failed DB update leaves still_active on deps.dev only.
        if [ "${INPUT_BUNDLER_AUDIT}" = "true" ]; then
          echo "::group::Installing bundler-audit (dual-source vulnerabilities)"
          # Best-effort end to end: a failed install OR DB update must not abort the
          # audit (set -e is active) — still_active just falls back to deps.dev only.
          if gem install bundler-audit --no-document && bundle-audit update; then
            echo "ruby-advisory-db ready; still_active will merge deps.dev + ruby-advisory-db"
          else
            echo "::warning::bundler-audit setup failed; still_active will use deps.dev only"
          fi
          echo "::endgroup::"
        fi

        # Optional CVSS 4.0 scorer. still_active soft-requires cvss-suite at runtime; with it
        # installed, advisories that carry only a CVSS 4.0 vector get a numeric score and can
        # clear the fail-if-vulnerable severity gate when they land below threshold. Without it
        # (still_active >= 3.0.0) those advisories stay unscored and fail the gate closed.
        if [ "${INPUT_CVSS_SUITE}" = "true" ]; then
          echo "::group::Installing cvss-suite (CVSS 4.0 scoring)"
          # Best-effort: a failed install (set -e is active) must not abort the audit —
          # still_active just leaves CVSS-4-only advisories unscored (fail-closed under the gate).
          if gem install cvss-suite --no-document; then
            echo "cvss-suite ready; still_active will score CVSS-4-only advisories"
          else
            echo "::warning::cvss-suite install failed; CVSS-4-only advisories stay unscored"
          fi
          echo "::endgroup::"
        fi

        args=()

        if [ -n "${INPUT_GEMFILE_PATH}" ]; then
          args+=("--gemfile=${INPUT_GEMFILE_PATH}")
        fi

        if [ -n "${INPUT_GEMS}" ]; then
          args+=("--gems=${INPUT_GEMS}")
        fi

        if [ -n "${INPUT_IGNORE}" ]; then
          normalised_ignore="$(printf '%s' "${INPUT_IGNORE}" | tr '\n' ',' | sed 's/,,*/,/g; s/^,//; s/,$//')"
          if [ -n "${normalised_ignore}" ]; then
            args+=("--ignore=${normalised_ignore}")
          fi
        fi

        if [ -n "${INPUT_BASELINE}" ]; then
          args+=("--baseline=${INPUT_BASELINE}")
        elif [ -n "${INPUT_SARIF}" ]; then
          args+=("--sarif=${INPUT_SARIF}")
          echo "sarif-path=${INPUT_SARIF}" >> "${GITHUB_OUTPUT}"
        elif [ -n "${INPUT_CYCLONEDX}" ]; then
          args+=("--cyclonedx=${INPUT_CYCLONEDX}")
          if [ -n "${INPUT_CYCLONEDX_VERSION}" ]; then
            args+=("--cyclonedx-version=${INPUT_CYCLONEDX_VERSION}")
          fi
          # Record the path only when writing to a file (not stdout).
          if [ "${INPUT_CYCLONEDX}" != "-" ]; then
            echo "cyclonedx-path=${INPUT_CYCLONEDX}" >> "${GITHUB_OUTPUT}"
          fi
        else
          case "${INPUT_OUTPUT_FORMAT}" in
            terminal) args+=("--terminal") ;;
            markdown) args+=("--markdown") ;;
            json|"") args+=("--json") ;;
            *)
              echo "::error::Unknown output-format '${INPUT_OUTPUT_FORMAT}'. Expected terminal, markdown, or json."
              exit 2
              ;;
          esac
        fi

        if [ "${INPUT_FAIL_IF_WARNING}" = "true" ]; then
          args+=("--fail-if-warning")
        fi

        case "${INPUT_FAIL_IF_VULNERABLE}" in
          ""|false) : ;;
          true) args+=("--fail-if-vulnerable") ;;
          low|medium|high|critical) args+=("--fail-if-vulnerable=${INPUT_FAIL_IF_VULNERABLE}") ;;
          *)
            echo "::error::fail-if-vulnerable must be true/false or one of: low, medium, high, critical."
            exit 2
            ;;
        esac

        if [ -n "${INPUT_FAIL_IF_OUTDATED}" ]; then
          args+=("--fail-if-outdated=${INPUT_FAIL_IF_OUTDATED}")
        fi

        # Independent modifier: works alongside any output mode (terminal/markdown/json/sarif).
        if [ "${INPUT_ALTERNATIVES}" = "true" ]; then
          args+=("--alternatives")
        fi

        if [ -n "${INPUT_EXTRA_ARGS}" ]; then
          # shellcheck disable=SC2206
          extra=( ${INPUT_EXTRA_ARGS} )
          args+=("${extra[@]}")
        fi

        report_path="${RUNNER_TEMP:-/tmp}/still_active-report.txt"
        echo "report-path=${report_path}" >> "${GITHUB_OUTPUT}"

        echo "::group::Running still_active ${args[*]}"
        set +e
        GITHUB_TOKEN="${INPUT_GITHUB_TOKEN}" GITLAB_TOKEN="${INPUT_GITLAB_TOKEN}" \
          still_active "${args[@]}" | tee "${report_path}"
        exit_code=${PIPESTATUS[0]}
        set -e
        echo "::endgroup::"

        echo "exit-code=${exit_code}" >> "${GITHUB_OUTPUT}"

        if [ "${INPUT_OUTPUT_FORMAT}" = "markdown" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            echo "## still_active report"
            echo
            cat "${report_path}"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

        if [ -n "${INPUT_BASELINE}" ] && [ -n "${GITHUB_STEP_SUMMARY:-}" ]; then
          {
            echo "## still_active baseline diff"
            echo
            cat "${report_path}"
          } >> "${GITHUB_STEP_SUMMARY}"
        fi

        exit "${exit_code}"
