name: Self-test

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read

jobs:
  green:
    name: Green fixture (no regressions, exit 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Resolve fixture lockfile
        working-directory: fixtures/green
        run: bundle lock
      - id: run
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/green/Gemfile
          fail-if-warning: 'true'
          bundler-audit: 'false'
      - name: Assert exit code 0
        run: |
          if [ "${{ steps.run.outputs.exit-code }}" != "0" ]; then
            echo "::error::Expected exit-code=0 for clean fixture, got '${{ steps.run.outputs.exit-code }}'"
            exit 1
          fi

  archived:
    name: Archived fixture (regression, exit 1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Resolve fixture lockfile
        working-directory: fixtures/archived
        run: bundle lock
      - id: run
        continue-on-error: true
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/archived/Gemfile
          fail-if-warning: 'true'
          bundler-audit: 'false'
      - name: Assert exit code 1
        run: |
          if [ "${{ steps.run.outputs.exit-code }}" != "1" ]; then
            echo "::error::Expected exit-code=1 for archived fixture, got '${{ steps.run.outputs.exit-code }}'"
            exit 1
          fi

  sarif:
    name: SARIF output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Resolve fixture lockfile
        working-directory: fixtures/green
        run: bundle lock
      - id: run
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/green/Gemfile
          sarif: still_active.sarif.json
          bundler-audit: 'false'
      - name: Assert SARIF file exists + has runs[]
        run: |
          test -f still_active.sarif.json
          jq -e '.runs[0].tool.driver.name == "still_active"' still_active.sarif.json
          jq -e '.version == "2.1.0"' still_active.sarif.json

  cyclonedx:
    name: CycloneDX SBOM output
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Resolve fixture lockfile
        working-directory: fixtures/green
        run: bundle lock
      - id: run
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/green/Gemfile
          cyclonedx: still_active.cdx.json
          cyclonedx-version: '1.7'
          bundler-audit: 'false'
      - name: Assert a valid CycloneDX SBOM that honours the requested version
        run: |
          test -f still_active.cdx.json
          jq -e '.bomFormat == "CycloneDX"' still_active.cdx.json
          jq -e '.specVersion == "1.7"' still_active.cdx.json
          jq -e '(.components | length) > 0' still_active.cdx.json

  dual-source:
    name: Dual-source vulnerabilities (bundler-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      # No bundle lock here — the fixture ships a committed lockfile pinning a
      # known-vulnerable version that no longer resolves cleanly.
      - id: run
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/vulnerable/Gemfile
          bundler-audit: 'true'
      - name: Assert ruby-advisory-db advisories were merged in
        env:
          REPORT: ${{ steps.run.outputs.report-path }}
        run: |
          test -n "$REPORT" && test -f "$REPORT"
          jq -e '[.gems[].vulnerabilities[]?.source] | any(. == "ruby-advisory-db" or . == "merged")' "$REPORT"

  alternatives:
    name: Alternative gem leads
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
      - name: Resolve fixture lockfile
        working-directory: fixtures/archived
        run: bundle lock
      - id: run
        uses: ./
        with:
          github-token: ${{ github.token }}
          gemfile-path: fixtures/archived/Gemfile
          alternatives: 'true'
          bundler-audit: 'false'
      - name: Assert maintained leads were attached to the archived gem
        env:
          REPORT: ${{ steps.run.outputs.report-path }}
        run: |
          test -n "$REPORT" && test -f "$REPORT"
          jq -e '.gems.nested_form.alternatives | length > 0' "$REPORT"
